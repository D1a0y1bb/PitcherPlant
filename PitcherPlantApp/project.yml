name: PitcherPlantApp
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CURRENT_PROJECT_VERSION: 18
    MARKETING_VERSION: 0.1.2-beta
    CODE_SIGN_STYLE: Automatic
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
targets:
  PitcherPlantApp:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/PitcherPlantApp
      - path: Resources/Localizable.xcstrings
      - path: Resources/Calibration
      - path: Resources/AppIcon.icon
      - path: Resources/Assets.xcassets
    dependencies:
      - package: GRDB
        product: GRDB
      - package: ZIPFoundation
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitcherplant.desktop
        PRODUCT_NAME: PitcherPlant
        PRODUCT_MODULE_NAME: PitcherPlantApp
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_DEBUG_DYLIB: NO
        PP_RELEASE_TAG: ""
    scheme:
      gatherCoverageData: false
      testTargets:
        - PitcherPlantAppTests
  PitcherPlantAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/PitcherPlantAppTests
    dependencies:
      - target: PitcherPlantApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitcherplant.desktop.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PitcherPlant.app/Contents/MacOS/PitcherPlant"
        BUNDLE_LOADER: "$(TEST_HOST)"
