name: PitcherPlantApp
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
targets:
  PitcherPlantApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/PitcherPlantApp
      - path: Resources/Assets.xcassets
    dependencies:
      - package: GRDB
        product: GRDB
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitcherplant.desktop
        PRODUCT_NAME: PitcherPlant
        PRODUCT_MODULE_NAME: PitcherPlantApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PitcherPlant
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_DEBUG_DYLIB: NO
    scheme:
      gatherCoverageData: false
      testTargets:
        - PitcherPlantAppTests
  PitcherPlantAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/PitcherPlantAppTests
    dependencies:
      - target: PitcherPlantApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitcherplant.desktop.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PitcherPlant.app/Contents/MacOS/PitcherPlant"
        BUNDLE_LOADER: "$(TEST_HOST)"
