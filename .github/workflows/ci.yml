name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

jobs:
  macos:
    name: macOS build and test (${{ matrix.runner_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_label: "macos-15-xcode-16.4"
            runner: macos-15
            xcode_path: /Applications/Xcode_16.4.app
          - runner_label: "macos-latest"
            runner: macos-latest
            xcode_path: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select fixed Xcode
        if: matrix.xcode_path != ''
        run: |
          if [ ! -d "${{ matrix.xcode_path }}" ]; then
            echo "Required Xcode is missing: ${{ matrix.xcode_path }}"
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "${{ matrix.xcode_path }}/Contents/Developer"

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: PitcherPlantApp
        run: xcodegen generate

      - name: Verify generated project is committed
        run: |
          git diff --exit-code -- PitcherPlantApp/PitcherPlantApp.xcodeproj || {
            echo "PitcherPlantApp.xcodeproj is out of date. Run xcodegen generate in PitcherPlantApp and commit the result."
            exit 1
          }

      - name: SwiftPM tests
        working-directory: PitcherPlantApp
        run: swift test

      - name: Xcode build
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Xcode tests
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            test

      - name: Release configuration build
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Lightweight integration and performance smoke
        working-directory: PitcherPlantApp
        env:
          PITCHERPLANT_CI_SMOKE: "1"
        run: swift test --parallel
