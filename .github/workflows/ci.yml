name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

jobs:
  macos:
    name: macOS 26 build and test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26
        run: |
          SELECTED_XCODE=""
          for candidate in /Applications/Xcode*.app; do
            if [ ! -d "$candidate" ]; then
              continue
            fi
            version="$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | awk '/^Xcode / { print $2 }')"
            case "$version" in
              26.*)
                SELECTED_XCODE="$candidate"
                break
                ;;
            esac
          done
          if [ -z "$SELECTED_XCODE" ]; then
            echo "Xcode 26 is required."
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$SELECTED_XCODE/Contents/Developer"

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Verify macOS 26 toolchain
        run: |
          swift --version | grep -E 'Apple Swift version 6\.2'
          xcodebuild -version | grep -E '^Xcode 26\.'

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: PitcherPlantApp
        run: xcodegen generate

      - name: Verify generated project is committed
        run: |
          git diff --exit-code -- PitcherPlantApp/PitcherPlantApp.xcodeproj || {
            echo "PitcherPlantApp.xcodeproj is out of date. Run xcodegen generate in PitcherPlantApp and commit the result."
            exit 1
          }

      - name: SwiftPM tests
        working-directory: PitcherPlantApp
        run: swift test

      - name: Xcode build
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Xcode tests
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            test

      - name: Release configuration build
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: UI launch smoke
        working-directory: PitcherPlantApp
        run: |
          trap 'pkill -x PitcherPlant >/dev/null 2>&1 || true' EXIT
          ./script/build_and_run.sh --verify

      - name: Lightweight integration and performance smoke
        working-directory: PitcherPlantApp
        env:
          PITCHERPLANT_CI_SMOKE: "1"
        run: swift test --parallel
