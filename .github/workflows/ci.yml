name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

jobs:
  macos:
    name: macOS build and test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: PitcherPlantApp
        run: xcodegen generate

      - name: Verify generated project is committed
        run: |
          git diff --exit-code -- PitcherPlantApp/PitcherPlantApp.xcodeproj || {
            echo "PitcherPlantApp.xcodeproj is out of date. Run xcodegen generate in PitcherPlantApp and commit the result."
            exit 1
          }

      - name: SwiftPM tests
        working-directory: PitcherPlantApp
        run: swift test

      - name: Xcode build
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            build

      - name: Xcode tests
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            test
