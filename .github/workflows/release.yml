name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: false
      dry_run:
        description: "Build ad-hoc artifacts and skip GitHub Release creation"
        type: boolean
        required: false
        default: true
      distribution:
        description: "Artifact signing mode"
        type: choice
        required: false
        default: ad-hoc
        options:
          - ad-hoc
          - developer-id
      xcode_path:
        description: "Optional Xcode.app path. Empty selects the newest installed Xcode."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  macos-release:
    name: Build macOS release
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_NAME: PitcherPlant
      XCODE_PATH: ${{ github.event.inputs.xcode_path }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          echo "Available Xcode apps:"
          ls -1 /Applications | grep '^Xcode' || true

          if [ -n "$XCODE_PATH" ]; then
            if [ ! -d "$XCODE_PATH" ]; then
              echo "Requested Xcode is missing: $XCODE_PATH"
              exit 1
            fi
            SELECTED_XCODE="$XCODE_PATH"
          else
            SELECTED_XCODE=""
            SELECTED_VERSION=""
            for candidate in /Applications/Xcode*.app; do
              if [ ! -d "$candidate" ]; then
                continue
              fi
              version="$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | awk '/^Xcode / { print $2 }')"
              if [ -z "$version" ]; then
                continue
              fi
              if [ -z "$SELECTED_VERSION" ] || [ "$(printf '%s\n%s\n' "$SELECTED_VERSION" "$version" | sort -V | tail -n 1)" = "$version" ]; then
                SELECTED_VERSION="$version"
                SELECTED_XCODE="$candidate"
              fi
            done

            if [ -z "$SELECTED_XCODE" ]; then
              echo "No usable Xcode installation found."
              exit 1
            fi
          fi

          echo "Selected Xcode: $SELECTED_XCODE"
          sudo xcode-select -s "$SELECTED_XCODE/Contents/Developer"
          xcode-select -p

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Verify macOS 26 toolchain
        run: |
          SWIFT_VERSION="$(swift --version | awk '/Apple Swift version/ { print $4; exit }')"
          if [ -z "$SWIFT_VERSION" ]; then
            echo "Unable to resolve Apple Swift version."
            exit 1
          fi
          if [ "$(printf '%s\n%s\n' "6.2" "$SWIFT_VERSION" | sort -V | head -n 1)" != "6.2" ]; then
            echo "Expected Apple Swift 6.2 or newer, got $SWIFT_VERSION"
            exit 1
          fi
          xcodebuild -version | grep -E '^Xcode 26\.'

      - name: Resolve release mode
        id: release
        run: |
          TAG_NAME="${{ github.event.inputs.version }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          DISTRIBUTION="${{ github.event.inputs.distribution }}"
          SIGNING_SECRETS_AVAILABLE="true"

          for name in \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [ -z "${!name}" ]; then
              SIGNING_SECRETS_AVAILABLE="false"
            fi
          done

          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            DRY_RUN="false"
            if [ -z "$DISTRIBUTION" ]; then
              if [ "$SIGNING_SECRETS_AVAILABLE" = "true" ]; then
                DISTRIBUTION="developer-id"
              else
                DISTRIBUTION="ad-hoc"
              fi
            fi
          elif [ -z "$DISTRIBUTION" ]; then
            DISTRIBUTION="ad-hoc"
          fi

          case "$DISTRIBUTION" in
            ad-hoc|developer-id)
              ;;
            *)
              echo "Unsupported distribution: $DISTRIBUTION"
              exit 2
              ;;
          esac

          if [ "$DRY_RUN" = "true" ]; then
            PUBLISH_RELEASE="false"
            RELEASE_NAME="dry-run-${GITHUB_RUN_ID}"
          else
            PUBLISH_RELEASE="true"
            RELEASE_NAME="$TAG_NAME"
          fi

          if [ "$DISTRIBUTION" = "developer-id" ]; then
            SIGNED_RELEASE="true"
          else
            SIGNED_RELEASE="false"
          fi

          case "$TAG_NAME" in
            v*)
              BUNDLE_RELEASE_TAG="$TAG_NAME"
              ;;
            *)
              BUNDLE_RELEASE_TAG=""
              ;;
          esac

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "bundle_release_tag=$BUNDLE_RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "distribution=$DISTRIBUTION" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"
          echo "signed_release=$SIGNED_RELEASE" >> "$GITHUB_OUTPUT"
          echo "signing_secrets_available=$SIGNING_SECRETS_AVAILABLE" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Preflight release inputs and secrets
        run: |
          missing=0

          if [ "${{ steps.release.outputs.publish_release }}" = "true" ]; then
            if [ -z "${{ steps.release.outputs.tag_name }}" ]; then
              echo "Missing release tag. Provide workflow_dispatch input 'version' or push a v* tag."
              missing=1
            fi

            case "${{ steps.release.outputs.tag_name }}" in
              v*)
                ;;
              *)
                echo "Release tag must start with v, got: ${{ steps.release.outputs.tag_name }}"
                missing=1
                ;;
            esac
          fi

          if [ "${{ steps.release.outputs.signed_release }}" = "true" ]; then
            for name in \
              APPLE_CERTIFICATE_BASE64 \
              APPLE_CERTIFICATE_PASSWORD \
              APPLE_SIGNING_IDENTITY \
              APPLE_TEAM_ID \
              APPLE_ID \
              APPLE_APP_SPECIFIC_PASSWORD
            do
              if [ -z "${!name}" ]; then
                echo "Missing required secret: $name"
                missing=1
              fi
            done
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Release mode: publish=${{ steps.release.outputs.publish_release }}, distribution=${{ steps.release.outputs.distribution }}, dry_run=${{ steps.release.outputs.dry_run }}, signing_secrets_available=${{ steps.release.outputs.signing_secrets_available }}"

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: PitcherPlantApp
        run: xcodegen generate

      - name: Verify generated project is committed
        run: |
          git diff --exit-code -- PitcherPlantApp/PitcherPlantApp.xcodeproj || {
            echo "PitcherPlantApp.xcodeproj is out of date. Run xcodegen generate in PitcherPlantApp and commit the result."
            exit 1
          }

      - name: Import signing certificate
        if: steps.release.outputs.signed_release == 'true'
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/signing_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-keychain-password}"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$APPLE_SIGNING_IDENTITY"

      - name: SwiftPM tests
        working-directory: PitcherPlantApp
        run: swift test

      - name: Xcode tests
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            test

      - name: Release configuration build
        working-directory: PitcherPlantApp
        run: |
          if [ "${{ steps.release.outputs.signed_release }}" = "true" ]; then
            xcodebuild \
              -project PitcherPlantApp.xcodeproj \
              -scheme PitcherPlantApp \
              -configuration Release \
              -destination 'platform=macOS' \
              PP_RELEASE_TAG="${{ steps.release.outputs.bundle_release_tag }}" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
              OTHER_CODE_SIGN_FLAGS="--timestamp" \
              build
          else
            xcodebuild \
              -project PitcherPlantApp.xcodeproj \
              -scheme PitcherPlantApp \
              -configuration Release \
              -destination 'platform=macOS' \
              PP_RELEASE_TAG="${{ steps.release.outputs.bundle_release_tag }}" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-" \
              build
          fi

      - name: Archive, package, and verify artifacts
        working-directory: PitcherPlantApp
        env:
          RELEASE_TAG: ${{ steps.release.outputs.bundle_release_tag }}
          RELEASE_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          if [ "${{ steps.release.outputs.signed_release }}" = "true" ]; then
            ./script/package_release.sh --distribution developer-id --notarize
          else
            ./script/package_release.sh --distribution ad-hoc
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: PitcherPlant-macOS-${{ steps.release.outputs.release_name }}
          path: |
            PitcherPlantApp/build/export/PitcherPlant.app
            PitcherPlantApp/build/dist/PitcherPlant-macOS.zip
            PitcherPlantApp/build/dist/PitcherPlant-macOS.dmg
            PitcherPlantApp/build/dist/PitcherPlant.xcarchive.zip
            PitcherPlantApp/build/dist/PitcherPlant-dSYMs.zip
            PitcherPlantApp/build/dist/PitcherPlant-macOS-checksums.txt
            PitcherPlantApp/build/dist/appcast.xml
            PitcherPlantApp/build/dist/release-notes.md

      - name: Publish GitHub release
        if: steps.release.outputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag_name }}" \
            PitcherPlantApp/build/dist/PitcherPlant-macOS.zip \
            PitcherPlantApp/build/dist/PitcherPlant-macOS.dmg \
            PitcherPlantApp/build/dist/PitcherPlant.xcarchive.zip \
            PitcherPlantApp/build/dist/PitcherPlant-dSYMs.zip \
            PitcherPlantApp/build/dist/PitcherPlant-macOS-checksums.txt \
            PitcherPlantApp/build/dist/appcast.xml \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.tag_name }}" \
            --notes-file PitcherPlantApp/build/dist/release-notes.md
