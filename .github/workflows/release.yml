name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: false
      dry_run:
        description: "Build ad-hoc artifacts and skip GitHub Release creation"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  macos-release:
    name: Build macOS release
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_NAME: PitcherPlant
      XCODE_PATH: /Applications/Xcode_16.4.app
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 16.4
        run: |
          if [ ! -d "$XCODE_PATH" ]; then
            echo "Required Xcode is missing: $XCODE_PATH"
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve release mode
        id: release
        run: |
          TAG_NAME="${{ github.event.inputs.version }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            DRY_RUN="false"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            FORMAL_RELEASE="false"
            RELEASE_NAME="dry-run-${GITHUB_RUN_ID}"
          else
            FORMAL_RELEASE="true"
            RELEASE_NAME="$TAG_NAME"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "formal_release=$FORMAL_RELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Preflight release inputs and secrets
        run: |
          missing=0

          if [ "${{ steps.release.outputs.formal_release }}" = "true" ]; then
            if [ -z "${{ steps.release.outputs.tag_name }}" ]; then
              echo "Missing release tag. Provide workflow_dispatch input 'version' or push a v* tag."
              missing=1
            fi

            for name in \
              APPLE_CERTIFICATE_BASE64 \
              APPLE_CERTIFICATE_PASSWORD \
              APPLE_SIGNING_IDENTITY \
              APPLE_TEAM_ID \
              APPLE_ID \
              APPLE_APP_SPECIFIC_PASSWORD
            do
              if [ -z "${!name}" ]; then
                echo "Missing required secret: $name"
                missing=1
              fi
            done
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Release mode: formal=${{ steps.release.outputs.formal_release }}, dry_run=${{ steps.release.outputs.dry_run }}"

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: PitcherPlantApp
        run: xcodegen generate

      - name: Verify generated project is committed
        run: |
          git diff --exit-code -- PitcherPlantApp/PitcherPlantApp.xcodeproj || {
            echo "PitcherPlantApp.xcodeproj is out of date. Run xcodegen generate in PitcherPlantApp and commit the result."
            exit 1
          }

      - name: Import signing certificate
        if: steps.release.outputs.formal_release == 'true'
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/signing_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-keychain-password}"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$APPLE_SIGNING_IDENTITY"

      - name: SwiftPM tests
        working-directory: PitcherPlantApp
        run: swift test

      - name: Xcode tests
        working-directory: PitcherPlantApp
        run: |
          xcodebuild \
            -project PitcherPlantApp.xcodeproj \
            -scheme PitcherPlantApp \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            test

      - name: Release configuration build
        working-directory: PitcherPlantApp
        run: |
          if [ "${{ steps.release.outputs.formal_release }}" = "true" ]; then
            xcodebuild \
              -project PitcherPlantApp.xcodeproj \
              -scheme PitcherPlantApp \
              -configuration Release \
              -destination 'platform=macOS' \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
              OTHER_CODE_SIGN_FLAGS="--timestamp" \
              build
          else
            xcodebuild \
              -project PitcherPlantApp.xcodeproj \
              -scheme PitcherPlantApp \
              -configuration Release \
              -destination 'platform=macOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-" \
              build
          fi

      - name: Archive app
        working-directory: PitcherPlantApp
        run: |
          rm -rf build/archive build/export build/dist build/checks
          mkdir -p build/archive build/export build/dist build/checks

          if [ "${{ steps.release.outputs.formal_release }}" = "true" ]; then
            xcodebuild archive \
              -project PitcherPlantApp.xcodeproj \
              -scheme PitcherPlantApp \
              -configuration Release \
              -archivePath "build/archive/${APP_NAME}.xcarchive" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
              OTHER_CODE_SIGN_FLAGS="--timestamp"

            {
              printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
              printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">'
              printf '%s\n' '<plist version="1.0">'
              printf '%s\n' '<dict>'
              printf '%s\n' '  <key>destination</key>'
              printf '%s\n' '  <string>export</string>'
              printf '%s\n' '  <key>method</key>'
              printf '%s\n' '  <string>developer-id</string>'
              printf '%s\n' '  <key>signingCertificate</key>'
              printf '%s\n' "  <string>${APPLE_SIGNING_IDENTITY}</string>"
              printf '%s\n' '  <key>signingStyle</key>'
              printf '%s\n' '  <string>manual</string>'
              printf '%s\n' '  <key>stripSwiftSymbols</key>'
              printf '%s\n' '  <true/>'
              printf '%s\n' '  <key>teamID</key>'
              printf '%s\n' "  <string>${APPLE_TEAM_ID}</string>"
              printf '%s\n' '</dict>'
              printf '%s\n' '</plist>'
            } > build/exportOptions.plist

            xcodebuild -exportArchive \
              -archivePath "build/archive/${APP_NAME}.xcarchive" \
              -exportPath build/export \
              -exportOptionsPlist build/exportOptions.plist
          else
            xcodebuild archive \
              -project PitcherPlantApp.xcodeproj \
              -scheme PitcherPlantApp \
              -configuration Release \
              -archivePath "build/archive/${APP_NAME}.xcarchive" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-"

            ditto "build/archive/${APP_NAME}.xcarchive/Products/Applications/${APP_NAME}.app" "build/export/${APP_NAME}.app"
          fi

      - name: Package archive and dSYMs
        working-directory: PitcherPlantApp
        run: |
          ditto -c -k --keepParent \
            "build/archive/${APP_NAME}.xcarchive" \
            "build/dist/${APP_NAME}.xcarchive.zip"

          if [ -d "build/archive/${APP_NAME}.xcarchive/dSYMs" ]; then
            ditto -c -k --keepParent \
              "build/archive/${APP_NAME}.xcarchive/dSYMs" \
              "build/dist/${APP_NAME}-dSYMs.zip"
          else
            mkdir -p build/empty-dSYMs
            ditto -c -k --keepParent \
              build/empty-dSYMs \
              "build/dist/${APP_NAME}-dSYMs.zip"
          fi

      - name: Verify app signature before notarization
        if: steps.release.outputs.formal_release == 'true'
        working-directory: PitcherPlantApp
        run: |
          codesign --verify --deep --strict --verbose=2 "build/export/${APP_NAME}.app"

      - name: Notarize and staple app
        if: steps.release.outputs.formal_release == 'true'
        working-directory: PitcherPlantApp
        run: |
          APP_NOTARY_ZIP="build/dist/${APP_NAME}-app-notary.zip"
          ditto -c -k --keepParent "build/export/${APP_NAME}.app" "$APP_NOTARY_ZIP"
          xcrun notarytool submit "$APP_NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "build/export/${APP_NAME}.app"
          xcrun stapler validate "build/export/${APP_NAME}.app"
          rm -f "$APP_NOTARY_ZIP"

      - name: Package ZIP and DMG
        working-directory: PitcherPlantApp
        run: |
          APP_BUNDLE="build/export/${APP_NAME}.app"
          DIST_DIR="build/dist"
          STAGING_DIR="build/dmg"

          test -d "$APP_BUNDLE"
          mkdir -p "$DIST_DIR" "$STAGING_DIR"
          ditto -c -k --keepParent "$APP_BUNDLE" "$DIST_DIR/${APP_NAME}-macOS.zip"
          rm -rf "$STAGING_DIR"/*
          cp -R "$APP_BUNDLE" "$STAGING_DIR/"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DIST_DIR/${APP_NAME}-macOS.dmg"

      - name: Notarize and staple DMG
        if: steps.release.outputs.formal_release == 'true'
        working-directory: PitcherPlantApp
        run: |
          xcrun notarytool submit "build/dist/${APP_NAME}-macOS.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "build/dist/${APP_NAME}-macOS.dmg"
          xcrun stapler validate "build/dist/${APP_NAME}-macOS.dmg"

      - name: Verify packaged artifacts
        working-directory: PitcherPlantApp
        run: |
          APP_BUNDLE="build/export/${APP_NAME}.app"
          ZIP_PATH="build/dist/${APP_NAME}-macOS.zip"
          DMG_PATH="build/dist/${APP_NAME}-macOS.dmg"
          ZIP_CHECK_DIR="build/checks/zip"
          DMG_MOUNT_ROOT="build/checks/dmg-mount"

          hdiutil verify "$DMG_PATH"

          rm -rf "$ZIP_CHECK_DIR" "$DMG_MOUNT_ROOT"
          mkdir -p "$ZIP_CHECK_DIR" "$DMG_MOUNT_ROOT"
          ditto -x -k "$ZIP_PATH" "$ZIP_CHECK_DIR"
          test -d "$ZIP_CHECK_DIR/${APP_NAME}.app"

          MOUNT_OUTPUT=$(hdiutil attach "$DMG_PATH" -readonly -nobrowse -mountroot "$DMG_MOUNT_ROOT")
          MOUNT_POINT=$(printf '%s\n' "$MOUNT_OUTPUT" | awk '/Apple_HFS/ {print $NF; exit}')
          test -n "$MOUNT_POINT"
          test -d "$MOUNT_POINT/${APP_NAME}.app"
          hdiutil detach "$MOUNT_POINT"

          if [ "${{ steps.release.outputs.formal_release }}" = "true" ]; then
            codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"
            codesign --verify --deep --strict --verbose=2 "$ZIP_CHECK_DIR/${APP_NAME}.app"
            xcrun stapler validate "$APP_BUNDLE"
            xcrun stapler validate "$ZIP_CHECK_DIR/${APP_NAME}.app"
            spctl --assess --type execute --verbose=4 "$APP_BUNDLE"
            spctl --assess --type execute --verbose=4 "$ZIP_CHECK_DIR/${APP_NAME}.app"
            spctl --assess --type open --verbose=4 "$DMG_PATH"
          fi

      - name: Generate checksums
        working-directory: PitcherPlantApp
        run: |
          files=(
            "build/dist/${APP_NAME}-macOS.zip"
            "build/dist/${APP_NAME}-macOS.dmg"
            "build/dist/${APP_NAME}.xcarchive.zip"
          )
          if [ -f "build/dist/${APP_NAME}-dSYMs.zip" ]; then
            files+=("build/dist/${APP_NAME}-dSYMs.zip")
          fi
          shasum -a 256 "${files[@]}" > "build/dist/${APP_NAME}-macOS-checksums.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: PitcherPlant-macOS-${{ steps.release.outputs.release_name }}
          path: |
            PitcherPlantApp/build/export/PitcherPlant.app
            PitcherPlantApp/build/dist/PitcherPlant-macOS.zip
            PitcherPlantApp/build/dist/PitcherPlant-macOS.dmg
            PitcherPlantApp/build/dist/PitcherPlant.xcarchive.zip
            PitcherPlantApp/build/dist/PitcherPlant-dSYMs.zip
            PitcherPlantApp/build/dist/PitcherPlant-macOS-checksums.txt

      - name: Publish GitHub release
        if: steps.release.outputs.formal_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag_name }}" \
            PitcherPlantApp/build/dist/PitcherPlant-macOS.zip \
            PitcherPlantApp/build/dist/PitcherPlant-macOS.dmg \
            PitcherPlantApp/build/dist/PitcherPlant.xcarchive.zip \
            PitcherPlantApp/build/dist/PitcherPlant-dSYMs.zip \
            PitcherPlantApp/build/dist/PitcherPlant-macOS-checksums.txt \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.tag_name }}" \
            --generate-notes
